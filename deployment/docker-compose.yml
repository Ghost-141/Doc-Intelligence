services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: doc-intel-api
    env_file:
      - ../.env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      UPLOAD_DIR: /app/data/uploads
      OCR_DEVICE: auto
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    ipc: host
    shm_size: 8gb
    gpus: all
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    restart: unless-stopped
